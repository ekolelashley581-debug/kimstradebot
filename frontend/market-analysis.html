<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Analysis – Kim's Trade Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #ffffff;
            --text-light: #cbd5e1;
            --border: #334155;
            --card: #1e293b;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        [data-theme="light"] {
            --bg: #f8fafc;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --card: #ffffff;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* AI Branding Header */
        .ai-header {
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .ai-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .ai-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .ai-subtitle {
            color: var(--text-light);
        }
        
        /* Sentiment Meter */
        .sentiment-meter {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .sentiment-gauge {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            position: relative;
        }
        
        .gauge-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 700;
        }
        
        .sentiment-label {
            margin-top: 15px;
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Market Grid */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .market-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .market-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .market-sentiment {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .market-change {
            font-size: 14px;
        }
        
        /* Top Movers */
        .movers-section {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .movers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .mover-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        
        /* AI Summary */
        .ai-summary {
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
        }
        
        .ai-summary h3 {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .back-btn {
            color: var(--primary);
            text-decoration: none;
        }
        
        .loading-spinner {
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .market-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .movers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Market Analysis</h1>
            <div>
                <div class="theme-toggle" onclick="toggleTheme()" style="cursor: pointer; display: inline-block; margin-right: 15px;">
                    <i class="fas fa-moon"></i>
                </div>
                <a href="/" class="back-btn">← Dashboard</a>
            </div>
        </div>
        
        <!-- AI Branding -->
        <div class="ai-header">
            <div class="ai-icon">🧠</div>
            <div class="ai-title">AI-Powered Market Intelligence</div>
            <div class="ai-subtitle">Real-time analysis of global markets • Updated every 30 seconds</div>
        </div>
        
        <!-- Sentiment Meter -->
        <div class="sentiment-meter">
            <h3>Overall Market Sentiment</h3>
            <div class="sentiment-gauge">
                <svg width="200" height="200" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="80" fill="none" stroke="var(--border)" stroke-width="15"/>
                    <circle id="gaugeFill" cx="100" cy="100" r="80" fill="none" stroke="var(--success)" stroke-width="15" stroke-dasharray="502" stroke-dashoffset="251" transform="rotate(-90 100 100)"/>
                </svg>
                <div class="gauge-value" id="sentimentValue">50%</div>
            </div>
            <div class="sentiment-label" id="sentimentLabel">Neutral</div>
        </div>
        
        <!-- Market Sectors -->
        <div class="market-grid" id="marketGrid">
            <div class="loading-spinner"></div>
        </div>
        
        <!-- Top Movers -->
        <div class="movers-section">
            <h3 style="margin-bottom: 15px;">🔥 Today's Top Movers</h3>
            <div class="movers-grid" id="topMovers">
                <div class="loading-spinner"></div>
            </div>
        </div>
        
        <!-- AI Summary -->
        <div class="ai-summary" id="aiSummary">
            <h3><i class="fas fa-microchip"></i> AI Market Summary</h3>
            <div class="loading-spinner"></div>
        </div>
        
        <button class="btn-primary" onclick="refreshAnalysis()" style="margin-top: 20px;">🔄 Refresh Analysis</button>
    </div>
    
    <script>
        const API = '/api';
        
        async function loadMarketAnalysis() {
            try {
                const res = await fetch(API + '/market-analysis');
                const data = await res.json();
                
                if (data.success) {
                    // Update sentiment gauge
                    const sentiment = data.overall_sentiment || 50;
                    const gauge = document.getElementById('gaugeFill');
                    const circumference = 2 * Math.PI * 80;
                    const offset = circumference * (1 - sentiment / 100);
                    if (gauge) {
                        gauge.style.strokeDasharray = circumference;
                        gauge.style.strokeDashoffset = offset;
                    }
                    document.getElementById('sentimentValue').innerText = Math.round(sentiment) + '%';
                    
                    let sentimentText = 'Neutral';
                    let sentimentColor = 'var(--warning)';
                    if (sentiment > 60) { sentimentText = 'Bullish'; sentimentColor = 'var(--success)'; }
                    else if (sentiment < 40) { sentimentText = 'Bearish'; sentimentColor = 'var(--danger)'; }
                    document.getElementById('sentimentLabel').innerHTML = `<span style="color: ${sentimentColor}">${sentimentText}</span>`;
                    
                    // Update market sectors
                    const marketGrid = document.getElementById('marketGrid');
                    if (data.sectors) {
                        marketGrid.innerHTML = data.sectors.map(sector => `
                            <div class="market-card">
                                <div class="market-name">${sector.name}</div>
                                <div class="market-sentiment" style="color: ${sector.sentiment === 'bullish' ? 'var(--success)' : sector.sentiment === 'bearish' ? 'var(--danger)' : 'var(--warning)'}">
                                    ${sector.sentiment === 'bullish' ? '📈' : sector.sentiment === 'bearish' ? '📉' : '➖'} ${sector.sentiment.toUpperCase()}
                                </div>
                                <div class="market-change">${sector.change_24h > 0 ? '+' : ''}${sector.change_24h}%</div>
                            </div>
                        `).join('');
                    }
                    
                    // Update top movers
                    const moversGrid = document.getElementById('topMovers');
                    if (data.top_movers) {
                        moversGrid.innerHTML = `
                            <div>
                                <h4 style="margin-bottom: 10px; color: var(--success);">📈 Top Gainers</h4>
                                ${data.top_movers.gainers.map(g => `
                                    <div class="mover-item">
                                        <span>${g.symbol}</span>
                                        <span style="color: var(--success);">+${g.change}%</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div>
                                <h4 style="margin-bottom: 10px; color: var(--danger);">📉 Top Losers</h4>
                                ${data.top_movers.losers.map(l => `
                                    <div class="mover-item">
                                        <span>${l.symbol}</span>
                                        <span style="color: var(--danger);">${l.change}%</span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    
                    // Update AI summary
                    const summaryDiv = document.getElementById('aiSummary');
                    if (data.ai_summary) {
                        summaryDiv.innerHTML = `
                            <h3><i class="fas fa-microchip"></i> AI Market Summary</h3>
                            <div style="line-height: 1.6;">${data.ai_summary}</div>
                            <div style="margin-top: 15px; font-size: 12px; color: var(--text-light);">
                                <i class="fas fa-clock"></i> Updated: ${new Date(data.timestamp).toLocaleString()}
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error('Error loading market analysis:', error);
            }
        }
        
        async function refreshAnalysis() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Refreshing...';
            btn.disabled = true;
            
            await loadMarketAnalysis();
            
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
        
        function toggleTheme() {
            let html = document.documentElement;
            let current = html.getAttribute('data-theme');
            let newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        loadMarketAnalysis();
        setInterval(loadMarketAnalysis, 30000);
    </script>
</body>
</html>
