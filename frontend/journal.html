<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journal – Kim's Trade Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #ffffff;
            --text-light: #cbd5e1;
            --border: #334155;
            --card: #1e293b;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        [data-theme="light"] {
            --bg: #f8fafc;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --card: #ffffff;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 5px;
        }
        
        /* Entry Form */
        .entry-form {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-light);
            font-size: 13px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        /* Entry Card */
        .entry-card {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .entry-date {
            font-weight: 600;
            color: var(--primary);
        }
        
        .entry-pair {
            background: rgba(37,99,235,0.1);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .entry-result {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .result-win { background: rgba(16,185,129,0.2); color: var(--success); }
        .result-loss { background: rgba(239,68,68,0.2); color: var(--danger); }
        
        .entry-notes {
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .entry-meta {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            gap: 15px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            float: right;
        }
        
        .back-btn {
            color: var(--primary);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📔 My Trading Journal</h1>
            <div>
                <div class="theme-toggle" onclick="toggleTheme()" style="cursor: pointer; display: inline-block; margin-right: 15px;">
                    <i class="fas fa-moon"></i>
                </div>
                <a href="/" class="back-btn">← Dashboard</a>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalTrades">0</div>
                <div class="stat-label">Total Trades</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winRate">0%</div>
                <div class="stat-label">Win Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="profitFactor">0</div>
                <div class="stat-label">Profit Factor</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="bestTrade">$0</div>
                <div class="stat-label">Best Trade</div>
            </div>
        </div>
        
        <!-- Add Entry Form -->
        <div class="entry-form">
            <h3 style="margin-bottom: 15px;">📝 New Journal Entry</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Pair / Asset</label>
                    <input type="text" id="tradePair" placeholder="e.g., BTC/USD, EUR/USD, TSLA">
                </div>
                <div class="form-group">
                    <label>Result</label>
                    <select id="tradeResult">
                        <option value="win">✅ Win (Profit)</option>
                        <option value="loss">❌ Loss</option>
                        <option value="breakeven">➖ Breakeven</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Entry Price</label>
                    <input type="number" id="entryPrice" step="any" placeholder="Entry price">
                </div>
                <div class="form-group">
                    <label>Exit Price</label>
                    <input type="number" id="exitPrice" step="any" placeholder="Exit price">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Position Size</label>
                    <input type="number" id="positionSize" step="any" placeholder="Amount / Lots">
                </div>
                <div class="form-group">
                    <label>Profit / Loss ($)</label>
                    <input type="number" id="profitLoss" step="any" placeholder="+100 or -50">
                </div>
            </div>
            <div class="form-group">
                <label>Notes / Lessons Learned</label>
                <textarea id="tradeNotes" placeholder="What did you learn? Why did you enter? What would you do differently?"></textarea>
            </div>
            <button class="btn-primary" onclick="addJournalEntry()">Save Entry</button>
        </div>
        
        <!-- Journal Entries List -->
        <div id="entriesList">
            <div class="loading-spinner"></div>
        </div>
    </div>
    
    <script>
        const API = '/api';
        let currentUser = null;
        
        async function init() {
            await checkLogin();
            await loadStats();
            await loadEntries();
        }
        
        async function checkLogin() {
            try {
                const res = await fetch(API + '/check_session');
                const data = await res.json();
                if (data.logged_in) {
                    currentUser = data.email;
                } else {
                    window.location.href = '/';
                }
            } catch (error) {
                window.location.href = '/';
            }
        }
        
        async function loadStats() {
            try {
                const res = await fetch(API + '/journal/stats');
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('totalTrades').innerText = data.total_trades || 0;
                    document.getElementById('winRate').innerText = (data.win_rate || 0) + '%';
                    document.getElementById('profitFactor').innerText = data.profit_factor || 0;
                    document.getElementById('bestTrade').innerText = '$' + (data.best_trade || 0).toLocaleString();
                }
            } catch (error) {
                console.log('Error loading stats:', error);
            }
        }
        
        async function loadEntries() {
            try {
                const res = await fetch(API + '/journal/entries');
                const data = await res.json();
                const container = document.getElementById('entriesList');
                
                if (data.entries && data.entries.length > 0) {
                    container.innerHTML = data.entries.map(entry => `
                        <div class="entry-card">
                            <div class="entry-header">
                                <span class="entry-date">${new Date(entry.date).toLocaleDateString()}</span>
                                <div>
                                    <span class="entry-pair">${escapeHtml(entry.pair)}</span>
                                    <span class="entry-result result-${entry.result}">${entry.result === 'win' ? '✅ WIN' : entry.result === 'loss' ? '❌ LOSS' : '➖ BREAKEVEN'}</span>
                                </div>
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px;">
                                <div><small>Entry: ${entry.entry_price}</small></div>
                                <div><small>Exit: ${entry.exit_price}</small></div>
                                <div><small>P/L: <strong style="color: ${entry.profit_loss >= 0 ? 'var(--success)' : 'var(--danger)'}">$${entry.profit_loss}</strong></small></div>
                            </div>
                            <div class="entry-notes">${escapeHtml(entry.notes)}</div>
                            <div class="entry-meta">
                                <span><i class="fas fa-chart-line"></i> Size: ${entry.position_size}</span>
                                <button class="delete-btn" onclick="deleteEntry(${entry.id})"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-light);">No journal entries yet. Start tracking your trades!</p>';
                }
            } catch (error) {
                console.error('Error loading entries:', error);
                document.getElementById('entriesList').innerHTML = '<p style="color: var(--danger);">Error loading entries</p>';
            }
        }
        
        async function addJournalEntry() {
            const pair = document.getElementById('tradePair').value;
            const result = document.getElementById('tradeResult').value;
            const entryPrice = parseFloat(document.getElementById('entryPrice').value);
            const exitPrice = parseFloat(document.getElementById('exitPrice').value);
            const positionSize = parseFloat(document.getElementById('positionSize').value);
            const profitLoss = parseFloat(document.getElementById('profitLoss').value);
            const notes = document.getElementById('tradeNotes').value;
            
            if (!pair) {
                alert('Please enter the pair/asset');
                return;
            }
            
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;
            
            try {
                const res = await fetch(API + '/journal/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pair, result, entry_price: entryPrice, exit_price: exitPrice,
                        position_size: positionSize, profit_loss: profitLoss, notes
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Clear form
                    document.getElementById('tradePair').value = '';
                    document.getElementById('entryPrice').value = '';
                    document.getElementById('exitPrice').value = '';
                    document.getElementById('positionSize').value = '';
                    document.getElementById('profitLoss').value = '';
                    document.getElementById('tradeNotes').value = '';
                    // Reload
                    await loadStats();
                    await loadEntries();
                } else {
                    alert(data.error || 'Failed to save entry');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        async function deleteEntry(entryId) {
            if (!confirm('Delete this journal entry?')) return;
            
            try {
                const res = await fetch(API + `/journal/delete/${entryId}`, {
                    method: 'DELETE'
                });
                
                const data = await res.json();
                
                if (data.success) {
                    await loadStats();
                    await loadEntries();
                } else {
                    alert('Failed to delete');
                }
            } catch (error) {
                alert('Network error');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function toggleTheme() {
            let html = document.documentElement;
            let current = html.getAttribute('data-theme');
            let newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        init();
    </script>
</body>
</html>
