<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicators Math Library – Kim's Trade Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #ffffff;
            --text-light: #cbd5e1;
            --border: #334155;
            --card: #1e293b;
            --hover: #2d3a4f;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --math-bg: #0f172a;
        }
        
        [data-theme="light"] {
            --bg: #f8fafc;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --card: #ffffff;
            --hover: #f1f5f9;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --math-bg: #f8fafc;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .premium-badge {
            background: linear-gradient(135deg, gold, #ffd700);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        /* Search Bar */
        .search-bar {
            margin-bottom: 30px;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text);
            font-size: 16px;
        }
        
        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        
        .category-btn {
            padding: 8px 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category-btn:hover, .category-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* Indicator Cards Grid */
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .indicator-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .indicator-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .indicator-header {
            padding: 20px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .indicator-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .indicator-category {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(37,99,235,0.1);
            border-radius: 20px;
            color: var(--primary);
        }
        
        .indicator-preview {
            padding: 20px;
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.5;
        }
        
        .indicator-formula {
            font-family: monospace;
            background: var(--math-bg);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            border-left: 3px solid var(--primary);
        }
        
        /* Modal for Detailed View */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--card);
            border-radius: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            padding: 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--card);
            z-index: 1;
        }
        
        .modal-close {
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
        }
        
        .modal-body {
            padding: 25px;
        }
        
        .formula-section {
            background: var(--math-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .formula-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary);
        }
        
        .formula {
            font-family: monospace;
            font-size: 14px;
            background: var(--bg);
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .example {
            background: var(--bg);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .calculator {
            background: var(--bg);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .calculator-input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
        }
        
        .calc-result {
            margin-top: 15px;
            padding: 12px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            text-align: center;
        }
        
        .back-btn {
            color: var(--primary);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .indicators-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📐 Technical Indicators Math Library <span class="premium-badge">PREMIUM</span></h1>
            <div>
                <div class="theme-toggle" onclick="toggleTheme()" style="cursor: pointer; display: inline-block; margin-right: 15px;">
                    <i class="fas fa-moon"></i>
                </div>
                <a href="/" class="back-btn">← Dashboard</a>
            </div>
        </div>
        
        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search indicators... (e.g., RSI, MACD, Moving Average)">
        </div>
        
        <!-- Category Tabs -->
        <div class="category-tabs">
            <button class="category-btn active" onclick="filterCategory('all')">All</button>
            <button class="category-btn" onclick="filterCategory('momentum')">📈 Momentum</button>
            <button class="category-btn" onclick="filterCategory('trend')">📊 Trend</button>
            <button class="category-btn" onclick="filterCategory('volatility')">📉 Volatility</button>
            <button class="category-btn" onclick="filterCategory('volume')">📊 Volume</button>
        </div>
        
        <!-- Indicators Grid -->
        <div class="indicators-grid" id="indicatorsGrid">
            <!-- Cards will be populated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for Detailed View -->
    <div id="indicatorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Indicator Name</h2>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be populated -->
            </div>
        </div>
    </div>
    
    <script>
        // ========================================
        // INDICATORS DATA
        // ========================================
        
        const indicators = [
            {
                name: "RSI (Relative Strength Index)",
                category: "momentum",
                shortDesc: "Measures the speed and magnitude of recent price changes to identify overbought or oversold conditions.",
                formula: "RSI = 100 - [100 / (1 + RS)]\n\nWhere:\nRS = Average Gain / Average Loss over specified period (typically 14 periods)\n\nAverage Gain = (Previous Average Gain × 13 + Current Gain) / 14\nAverage Loss = (Previous Average Loss × 13 + Current Loss) / 14",
                interpretation: "• RSI > 70 = Overbought (potential sell signal)\n• RSI < 30 = Oversold (potential buy signal)\n• RSI between 30-70 = Neutral\n• Divergence between RSI and price = potential reversal",
                example: "If over 14 days: Total Gains = 10%, Total Losses = 5%\nRS = 10/5 = 2\nRSI = 100 - (100/(1+2)) = 100 - 33.33 = 66.67 (Neutral/Bullish)",
                use: "Used to identify overbought/oversold conditions, divergence, and potential trend reversals."
            },
            {
                name: "MACD (Moving Average Convergence Divergence)",
                category: "momentum",
                shortDesc: "Shows the relationship between two moving averages to identify momentum and trend direction.",
                formula: "MACD Line = EMA(12) - EMA(26)\nSignal Line = EMA(9) of MACD Line\nHistogram = MACD Line - Signal Line\n\nWhere:\nEMA = Exponential Moving Average\nTypical periods: 12, 26, 9",
                interpretation: "• MACD crosses above signal line = Bullish\n• MACD crosses below signal line = Bearish\n• Histogram expanding = Increasing momentum\n• Divergence = Potential reversal",
                example: "If EMA12 = 100, EMA26 = 95\nMACD Line = 5\nIf Signal Line = 3\nHistogram = 2 (Bullish momentum)",
                use: "Identifies trend direction, momentum strength, and potential entry/exit points."
            },
            {
                name: "Moving Average (SMA)",
                category: "trend",
                shortDesc: "Calculates the average price over a specific period to smooth out price data and identify trend direction.",
                formula: "SMA = (P1 + P2 + P3 + ... + Pn) / n\n\nWhere:\nP = Price at period n\nn = Number of periods",
                interpretation: "• Price above MA = Uptrend\n• Price below MA = Downtrend\n• MA slope = Trend strength\n• Golden Cross = 50 MA crosses above 200 MA (Bullish)\n• Death Cross = 50 MA crosses below 200 MA (Bearish)",
                example: "Prices: 10, 12, 14, 16, 18 (5-period SMA)\nSMA = (10+12+14+16+18)/5 = 70/5 = 14",
                use: "Identifies trend direction, support/resistance levels, and trend reversals."
            },
            {
                name: "EMA (Exponential Moving Average)",
                category: "trend",
                shortDesc: "Weighted moving average that gives more importance to recent prices.",
                formula: "EMA = (Price × multiplier) + (Previous EMA × (1 - multiplier))\n\nWhere:\nMultiplier = 2 / (period + 1)",
                interpretation: "• More responsive to recent price changes than SMA\n• Crossovers indicate trend changes\n• EMA slope indicates momentum",
                example: "For 10-period EMA:\nMultiplier = 2/11 = 0.1818\nEMA = (Current Price × 0.1818) + (Previous EMA × 0.8182)",
                use: "Identifies trend direction with faster response than SMA."
            },
            {
                name: "Bollinger Bands",
                category: "volatility",
                shortDesc: "Measures market volatility by plotting bands around a moving average.",
                formula: "Middle Band = SMA(20)\nUpper Band = Middle Band + (Standard Deviation × 2)\nLower Band = Middle Band - (Standard Deviation × 2)\n\nStandard Deviation = √[Σ(Price - SMA)² / n]",
                interpretation: "• Price touching upper band = Overbought\n• Price touching lower band = Oversold\n• Squeeze = Low volatility (breakout coming)\n• Expansion = High volatility",
                example: "If SMA20 = 100, Standard Deviation = 5\nUpper Band = 110, Lower Band = 90",
                use: "Identifies overbought/oversold conditions, volatility expansion/contraction, and potential breakouts."
            },
            {
                name: "ATR (Average True Range)",
                category: "volatility",
                shortDesc: "Measures market volatility by calculating the average range between high and low prices.",
                formula: "True Range = max(High - Low, |High - Previous Close|, |Low - Previous Close|)\nATR = (Previous ATR × (n-1) + Current TR) / n",
                interpretation: "• Higher ATR = Higher volatility\n• Lower ATR = Lower volatility\n• ATR spikes indicate potential breakouts",
                example: "If True Range values: 10, 12, 11, 13, 9\nATR(5) = (10+12+11+13+9)/5 = 55/5 = 11",
                use: "Setting stop losses, position sizing, and identifying volatility changes."
            },
            {
                name: "Stochastic Oscillator",
                category: "momentum",
                shortDesc: "Compares closing price to price range over a period to identify momentum and potential reversals.",
                formula: "%K = (Current Close - Lowest Low) / (Highest High - Lowest Low) × 100\n%D = 3-period SMA of %K",
                interpretation: "• %K > 80 = Overbought\n• %K < 20 = Oversold\n• %K crosses above %D = Buy signal\n• %K crosses below %D = Sell signal\n• Divergence = Reversal signal",
                example: "If Current Close = 50, Lowest Low = 45, Highest High = 55\n%K = (50-45)/(55-45) × 100 = 5/10 × 100 = 50",
                use: "Identifies overbought/oversold conditions and potential reversal points."
            },
            {
                name: "Volume",
                category: "volume",
                shortDesc: "Measures the number of shares/contracts traded during a period.",
                formula: "Volume = Total number of units traded",
                interpretation: "• Increasing volume = Confirms trend\n• Decreasing volume = Trend weakness\n• Volume spike = Major event or breakout\n• Volume precedes price",
                example: "If 10,000 units traded in 1 hour = Volume = 10,000",
                use: "Confirms price movements, identifies breakouts, and measures market participation."
            },
            {
                name: "OBV (On-Balance Volume)",
                category: "volume",
                shortDesc: "Uses volume flow to predict price changes.",
                formula: "If Close > Previous Close: OBV = Previous OBV + Volume\nIf Close < Previous Close: OBV = Previous OBV - Volume\nIf Close = Previous Close: OBV = Previous OBV",
                interpretation: "• OBV rising = Buying pressure\n• OBV falling = Selling pressure\n• OBV divergence = Potential reversal",
                example: "Previous OBV = 1000, Volume = 500\nIf Close up: OBV = 1500\nIf Close down: OBV = 500",
                use: "Confirms trend strength and identifies divergences before price changes."
            },
            {
                name: "Fibonacci Retracement",
                category: "trend",
                shortDesc: "Uses mathematical ratios to predict potential support/resistance levels.",
                formula: "Levels: 0%, 23.6%, 38.2%, 50%, 61.8%, 78.6%, 100%\n\nRatio = (High - Low) × Fibonacci Level + Low (for uptrend)",
                interpretation: "• 38.2%, 50%, 61.8% = Key support/resistance levels\n• Price often retraces to these levels before continuing trend\n• 61.8% = Golden Ratio (strongest level)",
                example: "Uptrend from 100 to 200:\n38.2% = 100 + (100 × 0.382) = 138.2\n50% = 100 + (100 × 0.5) = 150\n61.8% = 100 + (100 × 0.618) = 161.8",
                use: "Identifies potential support/resistance levels for entries, exits, and stop losses."
            }
        ];
        
        let currentCategory = 'all';
        let currentSearch = '';
        
        // ========================================
        // RENDER INDICATORS
        // ========================================
        
        function renderIndicators() {
            const grid = document.getElementById('indicatorsGrid');
            let filtered = indicators;
            
            // Filter by category
            if (currentCategory !== 'all') {
                filtered = filtered.filter(i => i.category === currentCategory);
            }
            
            // Filter by search
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(i => 
                    i.name.toLowerCase().includes(searchLower) || 
                    i.shortDesc.toLowerCase().includes(searchLower)
                );
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 50px; color: var(--text-light);">No indicators found. Try a different search term.</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(indicator => `
                <div class="indicator-card" onclick="showIndicatorDetail('${indicator.name.replace(/'/g, "\\'")}')">
                    <div class="indicator-header">
                        <span class="indicator-name">${indicator.name}</span>
                        <span class="indicator-category">${getCategoryIcon(indicator.category)} ${indicator.category.toUpperCase()}</span>
                    </div>
                    <div class="indicator-preview">
                        ${indicator.shortDesc}
                        <div class="indicator-formula">
                            <i class="fas fa-calculator"></i> ${indicator.formula.split('\n')[0]}...
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getCategoryIcon(category) {
            switch(category) {
                case 'momentum': return '📈';
                case 'trend': return '📊';
                case 'volatility': return '📉';
                case 'volume': return '📊';
                default: return '📐';
            }
        }
        
        // ========================================
        // SHOW DETAILED MODAL
        // ========================================
        
        function showIndicatorDetail(indicatorName) {
            const indicator = indicators.find(i => i.name === indicatorName);
            if (!indicator) return;
            
            document.getElementById('modalTitle').innerHTML = indicator.name;
            document.getElementById('modalBody').innerHTML = `
                <div class="formula-section">
                    <div class="formula-title">📐 Mathematical Formula</div>
                    <div class="formula">${indicator.formula.replace(/\n/g, '<br>')}</div>
                </div>
                
                <div class="formula-section">
                    <div class="formula-title">📖 Interpretation</div>
                    <div class="formula" style="white-space: pre-wrap;">${indicator.interpretation}</div>
                </div>
                
                <div class="formula-section">
                    <div class="formula-title">💡 Practical Example</div>
                    <div class="example">
                        <strong>Example Calculation:</strong><br>
                        ${indicator.example}
                    </div>
                </div>
                
                <div class="formula-section">
                    <div class="formula-title">🎯 How to Use in Trading</div>
                    <div class="formula" style="white-space: pre-wrap;">${indicator.use}</div>
                </div>
                
                <div class="calculator" id="calculator_${indicator.name.replace(/\s/g, '_')}">
                    <div class="formula-title">🧮 Interactive Calculator</div>
                    <div id="calcContent_${indicator.name.replace(/\s/g, '_')}">
                        <p style="color: var(--text-light);">Interactive calculator coming soon for this indicator.</p>
                    </div>
                </div>
            `;
            
            // Add interactive calculator for specific indicators
            if (indicator.name.includes('RSI')) {
                addRSICalculator();
            } else if (indicator.name.includes('Moving Average')) {
                addMACalculator();
            } else if (indicator.name.includes('Stochastic')) {
                addStochasticCalculator();
            }
            
            document.getElementById('indicatorModal').style.display = 'flex';
        }
        
        function addRSICalculator() {
            const calcDiv = document.getElementById('calcContent_RSI_Relative_Strength_Index');
            if (calcDiv) {
                calcDiv.innerHTML = `
                    <div class="formula-title">Calculate RSI</div>
                    <label>Average Gain (over 14 periods):</label>
                    <input type="number" id="rsiGain" class="calculator-input" placeholder="Enter average gain" value="10">
                    <label>Average Loss (over 14 periods):</label>
                    <input type="number" id="rsiLoss" class="calculator-input" placeholder="Enter average loss" value="5">
                    <button class="category-btn" onclick="calculateRSI()" style="margin-top: 10px;">Calculate RSI</button>
                    <div id="rsiResult" class="calc-result">RSI = --</div>
                `;
            }
        }
        
        function addMACalculator() {
            const calcDiv = document.getElementById('calcContent_Moving_Average_SMA');
            if (calcDiv) {
                calcDiv.innerHTML = `
                    <div class="formula-title">Calculate Simple Moving Average (SMA)</div>
                    <label>Enter prices (comma separated):</label>
                    <input type="text" id="maPrices" class="calculator-input" placeholder="e.g., 10,12,14,16,18" value="10,12,14,16,18">
                    <button class="category-btn" onclick="calculateMA()" style="margin-top: 10px;">Calculate SMA</button>
                    <div id="maResult" class="calc-result">SMA = --</div>
                `;
            }
        }
        
        function addStochasticCalculator() {
            const calcDiv = document.getElementById('calcContent_Stochastic_Oscillator');
            if (calcDiv) {
                calcDiv.innerHTML = `
                    <div class="formula-title">Calculate Stochastic %K</div>
                    <label>Current Close Price:</label>
                    <input type="number" id="stochClose" class="calculator-input" placeholder="Current close" value="50">
                    <label>Lowest Low (over 14 periods):</label>
                    <input type="number" id="stochLow" class="calculator-input" placeholder="Lowest low" value="45">
                    <label>Highest High (over 14 periods):</label>
                    <input type="number" id="stochHigh" class="calculator-input" placeholder="Highest high" value="55">
                    <button class="category-btn" onclick="calculateStochastic()" style="margin-top: 10px;">Calculate %K</button>
                    <div id="stochResult" class="calc-result">%K = --</div>
                `;
            }
        }
        
        // ========================================
        // CALCULATOR FUNCTIONS
        // ========================================
        
        function calculateRSI() {
            const gain = parseFloat(document.getElementById('rsiGain').value);
            const loss = parseFloat(document.getElementById('rsiLoss').value);
            
            if (isNaN(gain) || isNaN(loss) || loss === 0) {
                document.getElementById('rsiResult').innerHTML = 'RSI = Invalid input';
                return;
            }
            
            const rs = gain / loss;
            const rsi = 100 - (100 / (1 + rs));
            document.getElementById('rsiResult').innerHTML = `RS = ${rs.toFixed(2)}<br>RSI = ${rsi.toFixed(2)}<br><span style="font-size: 12px;">${rsi > 70 ? '🔴 Overbought' : rsi < 30 ? '🟢 Oversold' : '🟡 Neutral'}</span>`;
        }
        
        function calculateMA() {
            const pricesStr = document.getElementById('maPrices').value;
            const prices = pricesStr.split(',').map(p => parseFloat(p.trim()));
            
            if (prices.some(isNaN)) {
                document.getElementById('maResult').innerHTML = 'SMA = Invalid input';
                return;
            }
            
            const sum = prices.reduce((a, b) => a + b, 0);
            const sma = sum / prices.length;
            document.getElementById('maResult').innerHTML = `SMA = ${sma.toFixed(2)}<br>Sum = ${sum.toFixed(2)} | Count = ${prices.length}`;
        }
        
        function calculateStochastic() {
            const close = parseFloat(document.getElementById('stochClose').value);
            const low = parseFloat(document.getElementById('stochLow').value);
            const high = parseFloat(document.getElementById('stochHigh').value);
            
            if (isNaN(close) || isNaN(low) || isNaN(high) || high === low) {
                document.getElementById('stochResult').innerHTML = '%K = Invalid input';
                return;
            }
            
            const k = ((close - low) / (high - low)) * 100;
            document.getElementById('stochResult').innerHTML = `%K = ${k.toFixed(2)}<br><span style="font-size: 12px;">${k > 80 ? '🔴 Overbought' : k < 20 ? '🟢 Oversold' : '🟡 Neutral'}</span>`;
        }
        
        // ========================================
        // FILTER FUNCTIONS
        // ========================================
        
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderIndicators();
        }
        
        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            currentSearch = e.target.value;
            renderIndicators();
        });
        
        function closeModal() {
            document.getElementById('indicatorModal').style.display = 'none';
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('indicatorModal');
            if (event.target === modal) {
                closeModal();
            }
        };
        
        function toggleTheme() {
            let html = document.documentElement;
            let current = html.getAttribute('data-theme');
            let newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        
        // Expose calculator functions to global scope
        window.calculateRSI = calculateRSI;
        window.calculateMA = calculateMA;
        window.calculateStochastic = calculateStochastic;
        window.showIndicatorDetail = showIndicatorDetail;
        window.filterCategory = filterCategory;
        window.closeModal = closeModal;
        window.toggleTheme = toggleTheme;
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        renderIndicators();
    </script>
</body>
</html>
