<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Idea – Kim's Trade Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #ffffff;
            --text-light: #cbd5e1;
            --border: #334155;
            --card: #1e293b;
            --primary: #2563eb;
        }
        body {
            background: var(--bg);
            color: var(--text);
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .idea-card {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--border);
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
        }
        .share-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .share-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .whatsapp { background: #25D366; color: white; }
        .twitter { background: #1DA1F2; color: white; }
        .copy { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Dashboard</a>
        <div class="idea-card" id="ideaContent">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script>
        const API = '/api';
        
        async function loadIdea() {
            const urlParams = new URLSearchParams(window.location.search);
            const ideaId = urlParams.get('id');
            
            if (!ideaId) {
                document.getElementById('ideaContent').innerHTML = '<p>Idea not found</p>';
                return;
            }
            
            try {
                const res = await fetch(API + '/ideas');
                const data = await res.json();
                const idea = data.ideas.find(i => i.id == ideaId);
                
                if (!idea) {
                    document.getElementById('ideaContent').innerHTML = '<p>Idea not found</p>';
                    return;
                }
                
                // Fetch replies
                const repliesRes = await fetch(API + `/ideas/${ideaId}/replies`);
                const repliesData = await repliesRes.json();
                const replies = repliesData.replies || [];
                
                document.getElementById('ideaContent').innerHTML = `
                    <h2 style="color: var(--primary); margin-bottom: 15px;">${escapeHtml(idea.title)}</h2>
                    <div style="margin-bottom: 15px;">
                        <strong>${escapeHtml(idea.user_email)}</strong>
                        <small style="color: var(--text-light); margin-left: 10px;">${new Date(idea.created_at).toLocaleString()}</small>
                    </div>
                    <p style="color: var(--text-light); line-height: 1.6; margin-bottom: 20px;">${escapeHtml(idea.description)}</p>
                    
                    <div class="share-buttons">
                        <button onclick="shareWhatsApp()" class="share-btn whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                        <button onclick="shareTwitter()" class="share-btn twitter"><i class="fab fa-twitter"></i> Twitter</button>
                        <button onclick="copyLink()" class="share-btn copy"><i class="fas fa-link"></i> Copy Link</button>
                    </div>
                    
                    <div style="margin-top: 30px;">
                        <h3 style="margin-bottom: 15px;">💬 Replies (${replies.length})</h3>
                        <div id="repliesList">
                            ${replies.map(reply => `
                                <div style="background: var(--bg); border-radius: 12px; padding: 15px; margin-bottom: 10px;">
                                    <strong style="color: var(--primary);">${escapeHtml(reply.user_email)}</strong>
                                    <small style="color: var(--text-light); margin-left: 10px;">${new Date(reply.created_at).toLocaleString()}</small>
                                    <p style="margin-top: 8px; color: var(--text-light);">${escapeHtml(reply.content)}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('ideaContent').innerHTML = '<p>Error loading idea</p>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function shareWhatsApp() {
            const url = window.location.href;
            window.open(`https://wa.me/?text=${encodeURIComponent(url)}`, '_blank');
        }
        
        function shareTwitter() {
            const url = window.location.href;
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this trading idea!`, '_blank');
        }
        
        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('✅ Link copied!');
            });
        }
        
        loadIdea();
    </script>
</body>
</html>
