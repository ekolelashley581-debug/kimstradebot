<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Kim's Trade Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    :root {
        --primary: #2563eb;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --dark: #0f172a;
        --darker: #020617;
    }
    
    [data-theme="dark"] {
        --bg: #0f172a;
        --text: #ffffff;
        --text-light: #cbd5e1;
        --border: #334155;
        --card: #1e293b;
        --hover: #2d3a4f;
    }
    
    [data-theme="light"] {
        --bg: #f8fafc;
        --text: #0f172a;
        --text-light: #475569;
        --border: #e2e8f0;
        --card: #ffffff;
        --hover: #f1f5f9;
    }
    
    body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        min-height: 100vh;
    }
    
    .admin-sidebar {
        width: 280px;
        background: var(--darker);
        color: white;
        height: 100vh;
        position: fixed;
        overflow-y: auto;
    }
    
    .admin-logo { padding: 30px 20px; border-bottom: 1px solid #334155; }
    .admin-logo h1 { font-size: 24px; background: linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .admin-logo p { font-size: 12px; color: #94a3b8; }
    
    .admin-nav-item {
        display: flex;
        align-items: center;
        padding: 14px 20px;
        margin: 4px 8px;
        border-radius: 12px;
        color: #cbd5e1;
        cursor: pointer;
        transition: all 0.3s;
    }
    .admin-nav-item i { width: 24px; margin-right: 12px; }
    .admin-nav-item:hover, .admin-nav-item.active { background: var(--primary); color: white; }
    
    .admin-main { flex: 1; margin-left: 280px; background: var(--bg); min-height: 100vh; }
    .admin-header {
        height: 70px;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
    }
    .admin-header h2 { color: var(--text); }
    .admin-content { padding: 30px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card); border-radius: 16px; padding: 24px; border: 1px solid var(--border); }
    .stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .stat-title { color: var(--text-light); }
    .stat-icon { width: 48px; height: 48px; background: linear-gradient(135deg,var(--primary),#7c3aed); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
    
    .admin-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; overflow: hidden; }
    .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .card-header h3 { color: var(--text); }
    .card-body { padding: 24px; color: var(--text); }
    
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text); }
    .data-table th { color: var(--text-light); }
    
    .tier-badge, .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; }
    .tier-free_trial { background: rgba(100,116,139,0.2); color: #94a3b8; }
    .tier-premium { background: rgba(255,215,0,0.2); color: gold; }
    .tier-pro { background: rgba(124,58,237,0.2); color: #a78bfa; }
    .status-success { background: rgba(16,185,129,0.2); color: var(--success); }
    
    .action-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; margin: 0 3px; }
    .action-btn.upgrade { background: var(--primary); color: white; }
    .btn-primary { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
    
    .transfer-section { background: linear-gradient(135deg,#10b98120,#05966920); border: 2px solid var(--success); border-radius: 16px; padding: 24px; margin-bottom: 30px; }
    .transfer-section h3 { color: var(--text); margin-bottom: 20px; }
    .transfer-input, .transfer-select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin-bottom: 15px; }
    
    .loading-spinner { border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .theme-toggle {
        width: 40px;
        height: 40px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text);
        margin-left: 15px;
    }
    
    @media (max-width: 768px) { .admin-sidebar { transform: translateX(-100%); position: fixed; z-index: 1000; } .admin-main { margin-left: 0; } .stats-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
    <div class="admin-sidebar">
        <div class="admin-logo"><h1>KIM'S TRADE BOT</h1><p>Admin Dashboard</p></div>
        <div class="admin-nav-item active" onclick="loadSection('overview')"><i class="fas fa-home"></i> Overview</div>
        <div class="admin-nav-item" onclick="loadSection('users')"><i class="fas fa-users"></i> Users</div>
        <div class="admin-nav-item" onclick="loadSection('payments')"><i class="fas fa-credit-card"></i> Payments</div>
        <div class="admin-nav-item" onclick="loadSection('ideas')"><i class="fas fa-lightbulb"></i> Market Ideas</div>
        <div class="admin-nav-item" onclick="loadSection('transfer')"><i class="fas fa-exchange-alt"></i> Transfer Money</div>
        <div class="admin-nav-item" onclick="loadSection('support')"><i class="fas fa-headset"></i> Support</div>
        <div class="admin-nav-item" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i> Back to Site</div>
        <div class="admin-nav-item" onclick="loadSection('payment-requests')"><i class="fas fa-credit-card"></i> Payment Requests</div>
    </div>
    <div class="admin-main">
        <div class="admin-header"><h2 id="pageTitle">Overview</h2><div><span id="adminEmail"></span></div></div>
        <div class="admin-content" id="adminContent"><div class="loading-spinner"></div></div>
    </div>
    <script>
        const API = '/api';
        let adminData = null;
        async function checkAdmin() {
            let res = await fetch(API+'/check_session');
            let data = await res.json();
            if(!data.logged_in || !data.is_admin) { window.location.href='/'; return; }
            document.getElementById('adminEmail').innerText = data.email;
            loadSection('overview');
        }
        function loadSection(section) {
            document.querySelectorAll('.admin-nav-item').forEach(i=>i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('pageTitle').innerText = section.charAt(0).toUpperCase()+section.slice(1);
            if(section==='overview') loadOverview();
            else if(section==='users') loadUsers();
            else if(section==='payments') loadPayments();
            else if(section==='ideas') loadIdeas();
            else if(section==='transfer') showTransferForm();
            else if(section==='support') loadSupport();
            else if(section==='payment-requests') loadPaymentRequests();
        }
        async function loadOverview() {
            document.getElementById('adminContent').innerHTML = '<div class="loading-spinner"></div>';
            let res = await fetch(API+'/admin/stats');
            let data = await res.json();
            document.getElementById('adminContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-header"><span>Total Users</span><div class="stat-icon"><i class="fas fa-users"></i></div></div><div class="stat-value">${data.stats.total_users}</div></div>
                    <div class="stat-card"><div class="stat-header"><span>Paid Users</span><div class="stat-icon"><i class="fas fa-crown"></i></div></div><div class="stat-value">${data.stats.paid_users}</div></div>
                    <div class="stat-card"><div class="stat-header"><span>Total Revenue</span><div class="stat-icon"><i class="fas fa-money-bill"></i></div></div><div class="stat-value">${data.stats.total_revenue.toLocaleString()} XAF</div></div>
                    <div class="stat-card"><div class="stat-header"><span>Monthly Revenue</span><div class="stat-icon"><i class="fas fa-chart-line"></i></div></div><div class="stat-value">${data.stats.monthly_revenue.toLocaleString()} XAF</div></div>
                </div>
                <div class="admin-card"><div class="card-header"><h3>Recent Payments</h3></div><div class="card-body"><table class="data-table"><tr><th>User</th><th>Amount</th><th>Plan</th><th>Date</th></tr>${data.payments.map(p=>`<tr><td>${p.user}</td><td>${p.amount} ${p.currency}</td><td><span class="tier-badge tier-${p.plan}">${p.plan.toUpperCase()}</span></td><td>${new Date(p.date).toLocaleDateString()}</td></tr>`).join('')}</table></div></div>`;
        }
        async function loadUsers() {
            let res = await fetch(API+'/admin/stats');
            let data = await res.json();
            document.getElementById('adminContent').innerHTML = `<div class="admin-card"><div class="card-header"><h3>All Users (${data.stats.total_users})</h3></div><div class="card-body"><table class="data-table"><tr><th>ID</th><th>Email</th><th>Tier</th><th>Country</th><th>Joined</th><th>Actions</th></tr>${data.users.map(u=>`<tr><td>#${u.id}</td><td>${u.email}</td><td><span class="tier-badge tier-${u.tier}">${u.tier.toUpperCase()}</span></td><td>${u.country}</td><td>${new Date(u.joined).toLocaleDateString()}</td><td><button class="action-btn upgrade" onclick="upgradeUser(${u.id},'premium')">Premium</button><button class="action-btn upgrade" onclick="upgradeUser(${u.id},'pro')">Pro</button></td></tr>`).join('')}</table></div></div>`;
        }
        async function upgradeUser(id,plan) { if(!confirm(`Upgrade user ${id} to ${plan}?`)) return; await fetch(API+'/admin/upgrade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:id,plan})}); alert('Upgraded!'); loadUsers(); }
        async function loadPayments() {
            let res = await fetch(API+'/admin/stats');
            let data = await res.json();
            document.getElementById('adminContent').innerHTML = `<div class="admin-card"><div class="card-header"><h3>Payment History</h3></div><div class="card-body"><table class="data-table"><tr><th>User</th><th>Amount</th><th>Plan</th><th>Date</th><th>Status</th></tr>${data.payments.map(p=>`<tr><td>${p.user}</td><td>${p.amount} ${p.currency}</td><td><span class="tier-badge tier-${p.plan}">${p.plan.toUpperCase()}</span></td><td>${new Date(p.date).toLocaleString()}</td><td><span class="status-badge status-success">Completed</span></td></tr>`).join('')}</table></div></div>`;
        }
        async function loadIdeas() {
            let res = await fetch(API+'/ideas');
            let data = await res.json();
            document.getElementById('adminContent').innerHTML = `<div class="admin-card"><div class="card-header"><h3>User Market Ideas</h3></div><div class="card-body">${data.ideas?.length?data.ideas.map(i=>`<div style="padding:15px; border-bottom:1px solid var(--border);"><strong>${i.title}</strong><br>${i.description}<br><small>By: ${i.user_email} | ${new Date(i.created_at).toLocaleString()}</small></div>`).join(''):'<p>No ideas submitted yet.</p>'}</div></div>`;
        }
        function showTransferForm() {
            document.getElementById('adminContent').innerHTML = `
                <div class="transfer-section"><h3>Transfer Money to Bank or Mobile Money</h3>
                <input type="number" id="amount" class="transfer-input" placeholder="Amount (XAF)">
                <select id="type" class="transfer-select" onchange="toggleFields()"><option value="bank">Bank Account</option><option value="momo">MTN Mobile Money</option></select>
                <div id="bankFields"><input type="text" id="bankName" class="transfer-input" placeholder="Bank Name"><input type="text" id="accountNumber" class="transfer-input" placeholder="Account Number"><input type="text" id="accountName" class="transfer-input" placeholder="Account Name"></div>
                <div id="momoFields" style="display:none;"><input type="tel" id="momoNumber" class="transfer-input" placeholder="MTN Number"><input type="text" id="momoName" class="transfer-input" placeholder="Recipient Name"></div>
                <button class="btn-primary" onclick="initiateTransfer()">Confirm Transfer</button></div>`;
        }
        function toggleFields() { let t=document.getElementById('type').value; document.getElementById('bankFields').style.display=t==='bank'?'block':'none'; document.getElementById('momoFields').style.display=t==='momo'?'block':'none'; }
        async function initiateTransfer() {
            let amount=document.getElementById('amount').value, type=document.getElementById('type').value, details={};
            if(type==='bank') details={bank:document.getElementById('bankName').value,account:document.getElementById('accountNumber').value,name:document.getElementById('accountName').value};
            else details={number:document.getElementById('momoNumber').value,name:document.getElementById('momoName').value};
            if(!amount||amount<1000) return alert('Enter valid amount');
            let res=await fetch(API+'/admin/transfer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount,destination:type,account_details:details})});
            let data=await res.json();
            alert(data.success?'Transfer initiated!':'Transfer failed');
        }
        async function loadPaymentRequests() {
    let res = await fetch(API + '/admin/payment-requests');
    let data = await res.json();
    
    const pendingCount = data.requests.filter(r => r.status === 'pending').length;
    
    document.getElementById('adminContent').innerHTML = `
        <div class="admin-card">
            <div class="card-header">
                <h3>Payment Requests</h3>
                <span class="badge" style="background:var(--primary); padding:4px 12px; border-radius:30px;">${pendingCount} pending</span>
            </div>
            <div class="card-body">
                ${data.requests.length === 0 ? '<p>No payment requests yet.</p>' : `
                <table class="data-table">
                    <thead>
                        <tr><th>User</th><th>Plan</th><th>Amount</th><th>Method</th><th>Details</th><th>Time</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        ${data.requests.map(req => `
                            <tr>
                                <td>${req.user}</td>
                                <td><span class="tier-badge tier-${req.plan}">${req.plan.toUpperCase()}</span></td>
                                <td>${req.amount} ${req.currency}</td>
                                <td>${req.method}</td>
                                <td><small>${JSON.stringify(req.details)}</small></td>
                                <td>${new Date(req.created_at).toLocaleString()}</td>
                                <td><span class="status-badge status-${req.status}">${req.status.toUpperCase()}</span></td>
                                <td>
                                    ${req.status === 'pending' ? `
                                        <button class="action-btn upgrade" onclick="approvePayment(${req.id})">Approve</button>
                                        <button class="action-btn" onclick="rejectPayment(${req.id})" style="background:#ef4444; color:white;">Reject</button>
                                    ` : req.status === 'approved' ? '✅ Approved' : '❌ Rejected'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                `}
            </div>
        </div>
    `;
}

async function approvePayment(requestId) {
    if(!confirm('Approve this payment? User will be upgraded to the selected plan.')) return;
    let res = await fetch(API + '/admin/payment-approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ request_id: requestId })
    });
    let data = await res.json();
    if(data.success) {
        alert('✅ Payment approved! User account upgraded.');
        loadPaymentRequests();
    } else {
        alert('❌ Failed to approve payment.');
    }
}

async function rejectPayment(requestId) {
    if(!confirm('Reject this payment?')) return;
    let res = await fetch(API + '/admin/payment-reject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ request_id: requestId })
    });
    let data = await res.json();
    if(data.success) {
        alert('Payment rejected.');
        loadPaymentRequests();
    }
}
        async function loadSupport() {
            let res = await fetch(API+'/support/messages');
            let data = await res.json();
            document.getElementById('adminContent').innerHTML = `<div class="admin-card"><div class="card-header"><h3>Support Messages</h3></div><div class="card-body"><table class="data-table"><tr><th>User</th><th>Message</th><th>Time</th><th>Status</th></tr>${data.messages.map(m=>`<tr><td>${m.user}</td><td>${m.message}</td><td>${new Date(m.time).toLocaleString()}</td><td>${m.status}</td></tr>`).join('')}</table></div></div>`;
        }
        checkAdmin();
    </script>
</body>
</html>
