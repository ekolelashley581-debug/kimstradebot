<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Kim's Trade Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
        }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-light: #1e293b;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --border: #334155;
            --card: #1e293b;
            --hover: #2d3a4f;
        }
        
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
        }
        
        /* Admin Sidebar */
        .admin-sidebar {
            width: 280px;
            background: var(--darker);
            color: white;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0,0,0,0.3);
        }
        
        .admin-logo {
            padding: 30px 20px;
            border-bottom: 1px solid #334155;
        }
        
        .admin-logo h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .admin-logo p {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .admin-nav {
            padding: 20px 0;
        }
        
        .admin-nav-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            margin: 4px 8px;
            border-radius: 12px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .admin-nav-item i {
            width: 24px;
            font-size: 18px;
            margin-right: 12px;
        }
        
        .admin-nav-item span { flex: 1; font-size: 14px; font-weight: 500; }
        
        .admin-nav-item:hover {
            background: #334155;
            color: white;
        }
        
        .admin-nav-item.active {
            background: var(--primary);
            color: white;
        }
        
        .admin-nav-divider {
            height: 1px;
            background: #334155;
            margin: 15px 20px;
        }
        
        /* Admin Main */
        .admin-main {
            flex: 1;
            margin-left: 280px;
            background: var(--bg);
            min-height: 100vh;
        }
        
        .admin-header {
            height: 70px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .admin-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }
        
        .admin-user {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }
        
        .admin-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        
        .admin-content {
            padding: 30px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .stat-title {
            color: var(--text-light);
            font-size: 14px;
            font-weight: 500;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
        }
        
        .stat-change {
            color: var(--success);
            font-size: 13px;
        }
        
        /* Admin Cards */
        .admin-card {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }
        
        .card-header h3 i {
            margin-right: 10px;
            color: var(--primary);
        }
        
        .card-body {
            padding: 24px;
        }
        
        /* Transfer Section */
        .transfer-section {
            background: linear-gradient(135deg, #10b98120, #05966920);
            border: 2px solid var(--success);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }
        
        .transfer-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .transfer-icon {
            width: 60px;
            height: 60px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }
        
        .transfer-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        
        .transfer-header p {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .transfer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .transfer-input {
            width: 100%;
            padding: 14px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
        }
        
        .transfer-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .transfer-select {
            width: 100%;
            padding: 14px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
        }
        
        .btn-primary {
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-success:hover {
            background: #0d9488;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th {
            text-align: left;
            padding: 15px 20px;
            background: var(--bg);
            color: var(--text-light);
            font-weight: 500;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        
        .data-table td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        
        .data-table tr:hover td {
            background: var(--hover);
        }
        
        .tier-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .tier-free {
            background: rgba(100,116,139,0.2);
            color: #94a3b8;
        }
        
        .tier-premium {
            background: rgba(255,215,0,0.2);
            color: gold;
        }
        
        .tier-pro {
            background: rgba(124,58,237,0.2);
            color: #a78bfa;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-success {
            background: rgba(16,185,129,0.2);
            color: var(--success);
        }
        
        .status-pending {
            background: rgba(245,158,11,0.2);
            color: var(--warning);
        }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            margin: 0 3px;
        }
        
        .action-btn.upgrade {
            background: var(--primary);
            color: white;
        }
        
        .action-btn.delete {
            background: var(--danger);
            color: white;
        }
        
        .loading-spinner {
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden { display: none !important; }
        
        /* Transfer History */
        .transfer-history {
            margin-top: 20px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        
        .history-details {
            flex: 1;
        }
        
        .history-amount {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        
        .history-meta {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 5px;
        }
        
        .history-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .transfer-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
            }
            .admin-main {
                margin-left: 0;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Admin Sidebar -->
    <div class="admin-sidebar" id="sidebar">
        <div class="admin-logo">
            <h1>KIM'S TRADE BOT</h1>
            <p>Admin Dashboard</p>
        </div>
        
        <div class="admin-nav">
            <div class="admin-nav-item active" onclick="loadSection('overview')">
                <i class="fas fa-home"></i> <span>Overview</span>
            </div>
            <div class="admin-nav-item" onclick="loadSection('users')">
                <i class="fas fa-users"></i> <span>Users</span>
            </div>
            <div class="admin-nav-item" onclick="loadSection('payments')">
                <i class="fas fa-credit-card"></i> <span>Payments</span>
            </div>
            <div class="admin-nav-divider"></div>
            <div class="admin-nav-item" onclick="loadSection('transfer')">
                <i class="fas fa-exchange-alt"></i> <span>Transfer Money</span>
            </div>
            <div class="admin-nav-item" onclick="loadSection('history')">
                <i class="fas fa-history"></i> <span>Transfer History</span>
            </div>
            <div class="admin-nav-divider"></div>
            <div class="admin-nav-item" onclick="loadSection('support')">
                <i class="fas fa-headset"></i> <span>Support Messages</span>
            </div>
            <div class="admin-nav-item" onclick="window.location.href='/'">
                <i class="fas fa-arrow-left"></i> <span>Back to Site</span>
            </div>
        </div>
    </div>
    
    <!-- Admin Main Content -->
    <div class="admin-main">
        <div class="admin-header">
            <i class="fas fa-bars" style="font-size:24px; cursor:pointer; display:none;" onclick="toggleSidebar()"></i>
            <h2 id="pageTitle">Overview</h2>
            <div class="admin-user" id="adminUser">
                <div class="admin-avatar" id="adminAvatar">A</div>
                <span id="adminEmail">admin@kimstradebot.com</span>
            </div>
        </div>
        
        <div class="admin-content" id="adminContent">
            <div class="loading-spinner"></div>
        </div>
    </div>
    
    <script>
        const API = 'http://localhost:5000/api';
        let adminData = null;
        let currentSection = 'overview';
        
        // ========================================
        // CHECK ADMIN ACCESS
        // ========================================
        
        async function checkAdmin() {
            try {
                let res = await fetch(API + '/check_session');
                let data = await res.json();
                
                if (!data.logged_in || !data.is_admin) {
                    window.location.href = '/';
                    return;
                }
                
                document.getElementById('adminEmail').innerText = data.email;
                document.getElementById('adminAvatar').innerText = data.email.charAt(0).toUpperCase();
                
                loadSection('overview');
                
            } catch (error) {
                window.location.href = '/';
            }
        }
        
        // ========================================
        // LOAD SECTIONS
        // ========================================
        
        function loadSection(section) {
            currentSection = section;
            
            document.querySelectorAll('.admin-nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.getElementById('pageTitle').innerText = 
                section.charAt(0).toUpperCase() + section.slice(1).replace('-', ' ');
            
            if (section === 'overview') loadOverview();
            else if (section === 'users') loadUsers();
            else if (section === 'payments') loadPayments();
            else if (section === 'transfer') showTransferForm();
            else if (section === 'history') loadTransferHistory();
            else if (section === 'support') loadSupportMessages();
        }
        
        // ========================================
        // OVERVIEW
        // ========================================
        
        async function loadOverview() {
            document.getElementById('adminContent').innerHTML = '<div class="loading-spinner"></div>';
            
            let res = await fetch(API + '/admin/stats');
            let data = await res.json();
            
            document.getElementById('adminContent').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">Total Users</span>
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                        </div>
                        <div class="stat-value">${data.stats.total_users}</div>
                        <div class="stat-change">↑ ${Math.round(data.stats.paid_users/data.stats.total_users*100)}% paid</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">Paid Users</span>
                            <div class="stat-icon"><i class="fas fa-crown"></i></div>
                        </div>
                        <div class="stat-value">${data.stats.paid_users}</div>
                        <div class="stat-change">${data.stats.premium_users || 0} Premium, ${data.stats.pro_users || 0} Pro</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">Total Revenue</span>
                            <div class="stat-icon"><i class="fas fa-money-bill"></i></div>
                        </div>
                        <div class="stat-value">${data.stats.total_revenue.toLocaleString()} XAF</div>
                        <div class="stat-change">≈ $${Math.round(data.stats.total_revenue/600)} USD</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">Monthly Revenue</span>
                            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        </div>
                        <div class="stat-value">${data.stats.monthly_revenue.toLocaleString()} XAF</div>
                        <div class="stat-change">Last 30 days</div>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">Trial Users</span>
                            <div class="stat-icon"><i class="fas fa-clock"></i></div>
                        </div>
                        <div class="stat-value">${data.stats.trial_users}</div>
                        <div class="stat-change">${Math.round(data.stats.trial_users/data.stats.total_users*100)}% converting</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">Support Tickets</span>
                            <div class="stat-icon"><i class="fas fa-headset"></i></div>
                        </div>
                        <div class="stat-value">${data.stats.unread_support || 0}</div>
                        <div class="stat-change">${data.stats.unread_support ? 'Unread' : 'All clear'}</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">Avg. Revenue/User</span>
                            <div class="stat-icon"><i class="fas fa-calculator"></i></div>
                        </div>
                        <div class="stat-value">${Math.round(data.stats.total_revenue/data.stats.total_users).toLocaleString()} XAF</div>
                        <div class="stat-change">Per user</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-title">Conversion Rate</span>
                            <div class="stat-icon"><i class="fas fa-percent"></i></div>
                        </div>
                        <div class="stat-value">${Math.round(data.stats.paid_users/data.stats.total_users*100)}%</div>
                        <div class="stat-change">Free → Paid</div>
                    </div>
                </div>
                
                <div class="admin-card">
                    <div class="card-header">
                        <h3><i class="fas fa-credit-card"></i> Recent Payments</h3>
                        <button class="btn-primary" onclick="loadSection('payments')" style="padding:8px 16px;">View All</button>
                    </div>
                    <div class="card-body">
                        <table class="data-table">
                            <tr><th>User</th><th>Amount</th><th>Plan</th><th>Date</th></tr>
                            ${data.payments.slice(0,5).map(p => `
                                <tr>
                                    <td>${p.user}</td>
                                    <td>${p.amount.toLocaleString()} XAF</td>
                                    <td><span class="tier-badge tier-${p.plan}">${p.plan.toUpperCase()}</span></td>
                                    <td>${new Date(p.date).toLocaleDateString()}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                </div>
            `;
        }
        
        // ========================================
        // USERS MANAGEMENT
        // ========================================
        
        async function loadUsers() {
            document.getElementById('adminContent').innerHTML = '<div class="loading-spinner"></div>';
            
            let res = await fetch(API + '/admin/stats');
            let data = await res.json();
            
            let html = `
                <div class="admin-card">
                    <div class="card-header">
                        <h3><i class="fas fa-users"></i> All Users (${data.stats.total_users})</h3>
                        <div>
                            <input type="text" id="userSearch" placeholder="Search users..." style="padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); margin-right:10px;">
                            <button class="btn-primary" onclick="searchUsers()" style="padding:8px 16px;">Search</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="data-table" id="usersTable">
                            <tr><th>ID</th><th>Email</th><th>Tier</th><th>Country</th><th>Joined</th><th>Last Login</th><th>Actions</th></tr>
                            ${data.users.map(u => `
                                <tr>
                                    <td>#${u.id}</td>
                                    <td>${u.email}</td>
                                    <td><span class="tier-badge tier-${u.tier.replace('_', '-')}">${u.tier.toUpperCase()}</span></td>
                                    <td>${u.country}</td>
                                    <td>${new Date(u.joined).toLocaleDateString()}</td>
                                    <td>${u.last_login ? new Date(u.last_login).toLocaleDateString() : 'Never'}</td>
                                    <td>
                                        <button class="action-btn upgrade" onclick="upgradeUser(${u.id}, 'premium')">Premium</button>
                                        <button class="action-btn upgrade" onclick="upgradeUser(${u.id}, 'pro')">Pro</button>
                                        <button class="action-btn delete" onclick="deleteUser(${u.id})">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('adminContent').innerHTML = html;
        }
        
        function searchUsers() {
            let search = document.getElementById('userSearch').value.toLowerCase();
            let rows = document.querySelectorAll('#usersTable tr:not(:first-child)');
            
            rows.forEach(row => {
                let text = row.textContent.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        }
        
        async function upgradeUser(userId, plan) {
            if (!confirm(`Upgrade user ${userId} to ${plan}?`)) return;
            
            await fetch(API + '/admin/upgrade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, plan })
            });
            
            alert('User upgraded successfully!');
            loadUsers();
        }
        
        function deleteUser(userId) {
            if (!confirm(`Are you sure you want to delete user ${userId}?`)) return;
            alert('Delete functionality would be implemented here');
        }
        
        // ========================================
        // PAYMENTS
        // ========================================
        
        async function loadPayments() {
            document.getElementById('adminContent').innerHTML = '<div class="loading-spinner"></div>';
            
            let res = await fetch(API + '/admin/stats');
            let data = await res.json();
            
            let html = `
                <div class="admin-card">
                    <div class="card-header">
                        <h3><i class="fas fa-credit-card"></i> Payment History</h3>
                        <div>
                            <button class="btn-primary" onclick="exportPayments()" style="margin-right:10px;">Export CSV</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="data-table">
                            <tr><th>User</th><th>Amount</th><th>Currency</th><th>Plan</th><th>Date</th><th>Status</th></tr>
                            ${data.payments.map(p => `
                                <tr>
                                    <td>${p.user}</td>
                                    <td>${p.amount.toLocaleString()}</td>
                                    <td>${p.currency || 'XAF'}</td>
                                    <td><span class="tier-badge tier-${p.plan}">${p.plan.toUpperCase()}</span></td>
                                    <td>${new Date(p.date).toLocaleString()}</td>
                                    <td><span class="status-badge status-success">Completed</span></td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('adminContent').innerHTML = html;
        }
        
        function exportPayments() {
            alert('Export to CSV - In production, this would download a file');
        }
        
        // ========================================
        // TRANSFER MONEY (Bank & MoMo)
        // ========================================
        
        function showTransferForm() {
            document.getElementById('adminContent').innerHTML = `
                <div class="transfer-section">
                    <div class="transfer-header">
                        <div class="transfer-icon">💰</div>
                        <div>
                            <h3>Transfer Money to Bank or Mobile Money</h3>
                            <p>Move funds from your MTN Business account to your personal accounts</p>
                        </div>
                    </div>
                    
                    <div class="transfer-grid">
                        <div>
                            <label style="display:block; margin-bottom:8px; color:var(--text);">Amount (XAF)</label>
                            <input type="number" id="transferAmount" class="transfer-input" placeholder="Enter amount" min="1000" step="1000">
                        </div>
                        <div>
                            <label style="display:block; margin-bottom:8px; color:var(--text);">Destination Type</label>
                            <select id="transferType" class="transfer-select" onchange="toggleTransferFields()">
                                <option value="bank">Bank Account</option>
                                <option value="momo">MTN Mobile Money</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="bankFields" style="display:block;">
                        <div class="transfer-grid">
                            <div>
                                <label style="display:block; margin-bottom:8px; color:var(--text);">Bank Name</label>
                                <select id="bankName" class="transfer-select">
                                    <option value="AFRILAND">Afriland First Bank</option>
                                    <option value="UBA">United Bank for Africa (UBA)</option>
                                    <option value="SCB">Société Commerciale de Banque (SCB)</option>
                                    <option value="BICEC">BICEC</option>
                                    <option value="SG">Société Générale</option>
                                </select>
                            </div>
                            <div>
                                <label style="display:block; margin-bottom:8px; color:var(--text);">Account Number</label>
                                <input type="text" id="bankAccount" class="transfer-input" placeholder="Enter account number">
                            </div>
                        </div>
                        <div class="transfer-grid">
                            <div>
                                <label style="display:block; margin-bottom:8px; color:var(--text);">Account Name</label>
                                <input type="text" id="accountName" class="transfer-input" placeholder="Enter account holder name">
                            </div>
                        </div>
                    </div>
                    
                    <div id="momoFields" style="display:none;">
                        <div class="transfer-grid">
                            <div>
                                <label style="display:block; margin-bottom:8px; color:var(--text);">MTN Number</label>
                                <input type="tel" id="momoNumber" class="transfer-input" placeholder="67XXXXXX">
                            </div>
                            <div>
                                <label style="display:block; margin-bottom:8px; color:var(--text);">Name</label>
                                <input type="text" id="momoName" class="transfer-input" placeholder="Recipient name">
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top:20px; display:flex; gap:10px;">
                        <button class="btn-success" onclick="initiateTransfer()" style="flex:2;">
                            <i class="fas fa-check"></i> Confirm Transfer
                        </button>
                        <button class="btn-primary" onclick="resetTransfer()" style="flex:1;">
                            <i class="fas fa-redo"></i> Reset
                        </button>
                    </div>
                    
                    <div id="transferStatus" style="margin-top:20px; display:none;"></div>
                </div>
                
                <div class="admin-card">
                    <div class="card-header">
                        <h3><i class="fas fa-history"></i> Recent Transfers</h3>
                        <button class="btn-primary" onclick="loadSection('history')">View All</button>
                    </div>
                    <div class="card-body" id="recentTransfers">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            `;
            
            loadRecentTransfers();
        }
        
        function toggleTransferFields() {
            let type = document.getElementById('transferType').value;
            document.getElementById('bankFields').style.display = type === 'bank' ? 'block' : 'none';
            document.getElementById('momoFields').style.display = type === 'momo' ? 'block' : 'none';
        }
        
        async function initiateTransfer() {
            let amount = document.getElementById('transferAmount').value;
            let type = document.getElementById('transferType').value;
            
            if (!amount || amount < 1000) {
                alert('Please enter a valid amount (minimum 1000 XAF)');
                return;
            }
            
            let accountDetails = {};
            
            if (type === 'bank') {
                let bank = document.getElementById('bankName').value;
                let account = document.getElementById('bankAccount').value;
                let name = document.getElementById('accountName').value;
                
                if (!account || !name) {
                    alert('Please fill all bank details');
                    return;
                }
                
                accountDetails = { bank, account, name };
            } else {
                let number = document.getElementById('momoNumber').value;
                let name = document.getElementById('momoName').value;
                
                if (!number || number.length < 9) {
                    alert('Please enter a valid MTN number');
                    return;
                }
                
                accountDetails = { number, name };
            }
            
            document.getElementById('transferStatus').innerHTML = '<div class="loading-spinner"></div><p style="text-align:center;">Processing transfer...</p>';
            document.getElementById('transferStatus').style.display = 'block';
            
            let res = await fetch(API + '/admin/transfer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount, destination: type, account_details: accountDetails })
            });
            
            let data = await res.json();
            
            if (data.success) {
                document.getElementById('transferStatus').innerHTML = `
                    <div style="background:var(--success); color:white; padding:20px; border-radius:10px; text-align:center;">
                        <i class="fas fa-check-circle" style="font-size:40px; margin-bottom:10px;"></i>
                        <h4>Transfer Initiated Successfully!</h4>
                        <p>${amount} XAF will be transferred to your ${type === 'bank' ? 'bank account' : 'MTN number'}.</p>
                        <p style="font-size:12px; margin-top:10px;">Transaction ID: ${data.transfer_id}</p>
                    </div>
                `;
                
                setTimeout(() => {
                    document.getElementById('transferStatus').style.display = 'none';
                    resetTransfer();
                    loadRecentTransfers();
                }, 3000);
            } else {
                document.getElementById('transferStatus').innerHTML = `
                    <div style="background:var(--danger); color:white; padding:20px; border-radius:10px; text-align:center;">
                        <i class="fas fa-exclamation-circle" style="font-size:40px; margin-bottom:10px;"></i>
                        <h4>Transfer Failed</h4>
                        <p>${data.error || 'Please try again'}</p>
                    </div>
                `;
            }
        }
        
        function resetTransfer() {
            document.getElementById('transferAmount').value = '';
            document.getElementById('transferType').value = 'bank';
            document.getElementById('bankAccount').value = '';
            document.getElementById('accountName').value = '';
            document.getElementById('momoNumber').value = '';
            document.getElementById('momoName').value = '';
            document.getElementById('transferStatus').style.display = 'none';
            toggleTransferFields();
        }
        
        async function loadRecentTransfers() {
            // Simulated transfer history
            let recent = document.getElementById('recentTransfers');
            if (!recent) return;
            
            recent.innerHTML = `

                    <div class="history-details">

                    <div><span class="history-status status-success">Completed</span></div>
                </div>
                <div class="history-item">

                    </div>

            `;
        }
        
        // ========================================

        function exportHistory() {

        function markAsRead(btn) {
            let row = btn.closest('tr');

            btn.disabled = true;

        }
        
        // ========================================
        // UTILITIES
        // ========================================
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('visible');

        // Initialize
        checkAdmin();
    </script>
