<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Analysis – Kim's Trade Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #ffffff;
            --text-light: #cbd5e1;
            --border: #334155;
            --card: #1e293b;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        [data-theme="light"] {
            --bg: #f8fafc;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --card: #ffffff;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Asset Selector */
        .asset-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .asset-selector select, .asset-selector input {
            padding: 10px 15px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
        }
        
        /* Chart */
        .chart-container {
            height: 500px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        /* Indicators Grid */
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .indicator-card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .indicator-value {
            font-size: 24px;
            font-weight: 700;
            margin: 10px 0;
        }
        
        /* Analysis Summary */
        .analysis-summary {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        
        .back-btn {
            color: var(--primary);
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .indicators-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Technical Analysis Tool</h1>
            <div>
                <div class="theme-toggle" onclick="toggleTheme()" style="cursor: pointer; display: inline-block; margin-right: 15px;">
                    <i class="fas fa-moon"></i>
                </div>
                <a href="/" class="back-btn">← Dashboard</a>
            </div>
        </div>
        
        <!-- Asset Selector -->
        <div class="asset-selector">
            <select id="assetType">
                <option value="crypto">💰 Cryptocurrency</option>
                <option value="forex">💱 Forex</option>
                <option value="stock">📈 Stocks</option>
                <option value="commodity">🏆 Commodities</option>
            </select>
            <select id="assetSymbol">
                <option value="BTCUSD">BTC/USD</option>
                <option value="ETHUSD">ETH/USD</option>
                <option value="SOLUSD">SOL/USD</option>
            </select>
            <button class="btn-primary" onclick="updateChart()">Update Chart</button>
            <button class="btn-primary" onclick="runTechnicalAnalysis()">Run Analysis</button>
        </div>
        
        <!-- Chart -->
        <div id="tv_chart" class="chart-container"></div>
        
        <!-- Technical Indicators -->
        <div class="indicators-grid" id="indicatorsGrid">
            <div class="indicator-card">
                <div>RSI (14)</div>
                <div class="indicator-value" id="rsi">—</div>
                <div id="rsiSignal">—</div>
            </div>
            <div class="indicator-card">
                <div>MACD</div>
                <div class="indicator-value" id="macd">—</div>
                <div id="macdSignal">—</div>
            </div>
            <div class="indicator-card">
                <div>Moving Average (50)</div>
                <div class="indicator-value" id="ma50">—</div>
                <div id="ma50Signal">—</div>
            </div>
            <div class="indicator-card">
                <div>Moving Average (200)</div>
                <div class="indicator-value" id="ma200">—</div>
                <div id="ma200Signal">—</div>
            </div>
        </div>
        
        <!-- Analysis Summary -->
        <div class="analysis-summary" id="analysisSummary">
            <h3>🤖 AI Technical Analysis</h3>
            <p id="analysisText">Select an asset and click "Run Analysis" to get AI-powered insights.</p>
        </div>
    </div>
    
    <script>
        const API = '/api';
        let currentChart = null;
        
        function updateChart() {
            const symbol = document.getElementById('assetSymbol').value;
            
            if (currentChart) {
                currentChart.remove();
            }
            
            currentChart = new TradingView.widget({
                "container_id": "tv_chart",
                "width": "100%",
                "height": "100%",
                "symbol": symbol,
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": document.documentElement.getAttribute('data-theme') || 'dark',
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "studies": ["RSI@tv-basicstudies", "MACD@tv-basicstudies", "BB@tv-basicstudies"]
            });
        }
        
        async function runTechnicalAnalysis() {
            const symbol = document.getElementById('assetSymbol').value;
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
            btn.disabled = true;
            
            try {
                const res = await fetch(API + '/technical-analysis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Update indicators
                    document.getElementById('rsi').innerText = data.rsi || '—';
                    document.getElementById('rsiSignal').innerHTML = `<span style="color: ${data.rsi_signal_color}">${data.rsi_signal}</span>`;
                    document.getElementById('macd').innerText = data.macd_value || '—';
                    document.getElementById('macdSignal').innerHTML = `<span style="color: ${data.macd_signal_color}">${data.macd_signal}</span>`;
                    document.getElementById('ma50').innerText = data.ma_50 ? `$${data.ma_50.toLocaleString()}` : '—';
                    document.getElementById('ma200').innerText = data.ma_200 ? `$${data.ma_200.toLocaleString()}` : '—';
                    document.getElementById('ma50Signal').innerHTML = data.ma_50_signal || '—';
                    document.getElementById('ma200Signal').innerHTML = data.ma_200_signal || '—';
                    
                    // Update analysis text
                    document.getElementById('analysisText').innerHTML = data.analysis || 'Analysis complete.';
                } else {
                    alert(data.error || 'Analysis failed');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        function toggleTheme() {
            let html = document.documentElement;
            let current = html.getAttribute('data-theme');
            let newTheme = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateChart();
        }
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        updateChart();
    </script>
</body>
</html>
