<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM'S TRADE BOT – Professional Trading Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== YOUR ORIGINAL CSS ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --darker: #020617;
            --sidebar-width: 280px;
        }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-light: #1e293b;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --border: #334155;
            --card: #1e293b;
            --hover: #2d3a4f;
        }
        
        [data-theme="light"] {
            --bg: #f8fafc;
            --bg-light: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --card: #ffffff;
            --hover: #f1f5f9;
        }
        
        body {
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            transition: all 0.3s;
        }
        
        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--darker);
            color: white;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid #334155;
        }
        
        .sidebar-header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .sidebar-header p {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            margin: 4px 8px;
            border-radius: 12px;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-item i {
            width: 24px;
            font-size: 18px;
            margin-right: 12px;
        }
        
        .nav-item span { flex: 1; font-size: 14px; font-weight: 500; }
        .nav-item .badge {
            background: var(--primary);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .nav-item:hover { background: #334155; color: white; }
        .nav-item.active { background: var(--primary); color: white; }
        
        .nav-divider {
            height: 1px;
            background: #334155;
            margin: 15px 20px;
        }
        
        .user-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            border-top: 1px solid #334155;
            display: flex;
            align-items: center;
            background: var(--darker);
        }
        
        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 12px;
            color: white;
        }
        
        .user-details h4 { font-size: 14px; margin-bottom: 3px; color: white; }
        .user-details p { font-size: 11px; color: #94a3b8; }
        
        /* ADDED: Logout button container inside sidebar (before user-info) */
        .logout-container {
            padding: 15px 20px 10px 20px;
            border-top: 1px solid #334155;
            margin-top: auto;
        }
        
        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .logout-btn:hover {
            background: #dc2626;
        }
        
        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            background: var(--bg);
            min-height: 100vh;
        }
        
        .top-header {
            height: 70px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .theme-toggle {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
            transition: all 0.3s;
        }
        
        .theme-toggle:hover {
            background: var(--primary);
            color: white;
        }
        
        /* ADDED: Fullscreen button for charts */
        .fullscreen-btn {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
            transition: all 0.3s;
        }
        
        .fullscreen-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .lang-selector {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
        }
        
        .tier-badge {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .content-area {
            padding: 30px;
        }
        
        /* ========== REST OF YOUR CSS (unchanged) ========== */
        /* AUTH PAGES - BEAUTIFUL LOGIN */
        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: var(--card);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h2 {
            color: var(--text);
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .auth-flags {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .flag-btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            border-radius: 30px;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .flag-btn:hover {
            border-color: var(--primary);
        }
        
        .flag-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--bg);
            padding: 5px;
            border-radius: 50px;
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 14px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s;
        }
        
        .auth-tab.active {
            background: var(--primary);
            color: white;
        }
        
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 18px;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }
        
        .btn-secondary {
            background: var(--bg);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-secondary:hover {
            background: var(--hover);
        }
        
        .error-message {
            background: rgba(239,68,68,0.1);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        /* STATS GRID - BUSY PROFESSIONAL */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .stat-title {
            color: var(--text-light);
            font-size: 14px;
            font-weight: 500;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
        }
        
        .stat-change {
            color: var(--success);
            font-size: 13px;
        }
        
        /* TWO COLUMN LAYOUT */
        .two-column {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .three-column {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        /* CARDS */
        .card {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-header h3 {
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
        }
        
        .card-header h3 i {
            margin-right: 10px;
            color: var(--primary);
        }
        
        .card-body {
            padding: 24px;
        }
        
        /* MARKET TABLE */
        .market-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .market-table th {
            text-align: left;
            padding: 15px 20px;
            color: var(--text-light);
            font-weight: 500;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        
        .market-table td {
            padding: 15px 20px;
            color: var(--text);
            border-bottom: 1px solid var(--border);
        }
        
        .market-table tr:hover td {
            background: var(--hover);
        }
        
        .pair-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pair-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }
        
        .price.up { color: var(--success); font-weight: 600; }
        .price.down { color: var(--danger); font-weight: 600; }
        
        .signal {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .signal.buy {
            background: rgba(16,185,129,0.15);
            color: var(--success);
        }
        
        .signal.sell {
            background: rgba(239,68,68,0.15);
            color: var(--danger);
        }
        
        .signal.wait {
            background: rgba(245,158,11,0.15);
            color: var(--warning);
        }
        
        /* AI ANALYSIS CARDS - PROFESSIONAL */
        .ai-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .ai-card {
            background: var(--bg);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid;
            transition: all 0.3s;
        }
        
        .ai-card.success { border-left-color: var(--success); }
        .ai-card.warning { border-left-color: var(--warning); }
        .ai-card.danger { border-left-color: var(--danger); }
        
        .ai-card:hover {
            transform: translateX(5px);
        }
        
        .ai-pair {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
        }
        
        .ai-signal {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .ai-signal.buy {
            background: rgba(16,185,129,0.15);
            color: var(--success);
        }
        
        .ai-signal.sell {
            background: rgba(239,68,68,0.15);
            color: var(--danger);
        }
        
        .ai-signal.wait {
            background: rgba(245,158,11,0.15);
            color: var(--warning);
        }
        
        .ai-confidence {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        
        .confidence-bar {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
        }
        
        .ai-reason {
            color: var(--text-light);
            font-size: 13px;
            line-height: 1.5;
        }
        
        /* NEWS SOURCES */
        .sources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .source-card {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .source-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        
        .source-card.selected {
            border-color: var(--success);
            background: rgba(16,185,129,0.1);
        }
        
        .source-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .source-name {
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text);
        }
        
        .source-category {
            font-size: 11px;
            color: var(--text-light);
        }
        
        /* CHART */
        .chart-container {
            height: 500px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        .chart-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .chart-btn {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .chart-btn:hover {
            background: var(--hover);
        }
        
        .chart-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* NEWS FEED */
        .news-feed {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .news-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .news-item:hover {
            background: var(--hover);
        }
        
        .news-source {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
            color: var(--text-light);
        }
        
        .news-title {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }
        
        /* UPGRADE PAGE */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .pricing-card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid transparent;
            position: relative;
            transition: all 0.3s;
        }
        
        .pricing-card:hover {
            transform: translateY(-10px);
        }
        
        .pricing-card.premium {
            border-color: gold;
        }
        
        .pricing-card.pro {
            border-color: var(--primary);
        }
        
        .popular-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: gold;
            color: black;
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .pricing-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .pricing-price {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
        }
        
        .pricing-price small {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-light);
        }
        
        .pricing-features {
            list-style: none;
            margin: 25px 0;
        }
        
        .pricing-features li {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text);
        }
        
        .pricing-features i {
            margin-right: 10px;
        }
        
        .feature-check { color: var(--success); }
        .feature-times { color: var(--danger); }
        
        .payment-section {
            background: linear-gradient(135deg, #ffc10720, #ff8e8e20);
            border: 2px solid #ffc107;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .payment-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .payment-icon {
            width: 60px;
            height: 60px;
            background: #ffc107;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        /* SUPPORT CHAT */
        .chat-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            transition: all 0.3s;
        }
        
        .chat-button:hover {
            transform: scale(1.1);
        }
        
        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            height: 500px;
            background: var(--card);
            border-radius: 15px;
            border: 1px solid var(--border);
            display: none;
            flex-direction: column;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .chat-header {
            padding: 15px;
            background: var(--primary);
            color: white;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header span:last-child {
            cursor: pointer;
            font-size: 20px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: var(--bg);
        }
        
        .message {
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .message.user {
            background: var(--primary);
            color: white;
            margin-left: auto;
        }
        
        .message.bot {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid var(--border);
            background: var(--card);
        }
        
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            margin-right: 10px;
        }
        
        .chat-input button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chat-input button:hover {
            background: var(--primary-dark);
        }
        
        /* FOOTER */
        .footer {
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 40px 30px;
            margin-top: 40px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .footer-links a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .footer-links a:hover {
            color: var(--primary);
        }
        
        .footer-copyright {
            text-align: center;
            color: var(--text-light);
            font-size: 13px;
        }
        
        /* LOADING */
        .loading-spinner {
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden { display: none !important; }
        
        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .three-column { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .main-content { margin-left: 0; }
            .two-column, .three-column, .pricing-grid { grid-template-columns: 1fr; }
            .ai-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
