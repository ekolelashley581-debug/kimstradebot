            --warning: #f59e0b;
            --danger: #ef4444;

            --bg-light: #ffffff;
            --text: #0f172a;

            --border: #e2e8f0;
            --card: #ffffff;
            --hover: #f1f5f9;

            top: 0;

            padding: 30px 20px;
            border-bottom: 1px solid #334155;

            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .sidebar-header p {
            font-size: 12px;
            color: #94a3b8;
        }

            margin-right: 12px;

            background: #334155;
            margin: 15px 20px;

        .sidebar-footer {
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid #334155;
        }
        
        .user-info {

            align-items: center;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 12px;
            color: white;

            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;

            align-items: center;

            font-weight: 700;
            color: var(--text);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .theme-toggle, .fullscreen-chart-btn {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
            transition: all 0.3s;
        }
        .theme-toggle:hover, .fullscreen-chart-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .lang-selector {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;

            padding: 20px;
            border-radius: 0;

            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;

            box-shadow: 0 20px 40px rgba(0,0,0,0.2);

            border-top-color: var(--primary);

            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

                        }
                        newsItem.innerHTML = `
                            <div class="news-source"><span><strong>${article.source || 'News'}</strong></span><span>${timeAgo}</span></div>
                            <div class="news-title" style="font-weight:600; margin:8px 0;">${article.title || 'No title'}</div>
                            <div class="news-description" style="font-size:12px; color:var(--text-light);">${article.description ? article.description.substring(0,120)+'...' : 'Click to read full article'}</div>
                        `;
                        newsContainer.appendChild(newsItem);
                    });
                } else { newsContainer.innerHTML = '<p>Could not load news.</p>'; }
            } catch (error) { newsContainer.innerHTML = '<p>Error loading news.</p>'; }
        }
        
        // Override showDashboard to include news loading
        const originalShowDashboard = showDashboard;
        showDashboard = function() {
            originalShowDashboard();
            setTimeout(() => { loadRealNews(); setInterval(loadRealNews, 300000); }, 500);
        };
        
        // Initial theme load
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.querySelector('.theme-toggle i').className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        
        checkLogin();
    </script>
</body>
</html>
